name: Build SVConfig Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL \
            "https://github.com/gradle/gradle/raw/refs/tags/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.wrapper.validateDistributionUrl=false

      # Keep the artifact upload for manual downloads / history
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVConfig-APK
          path: app/build/outputs/apk/release/SVConfig-*.apk
          retention-days: 30

      # Push the APK into the F-Droid repo
      - name: Push APK to fdroid repo
        env:
          FDROID_TOKEN: ${{ secrets.FDROID_REPO_TOKEN }}
        run: |
          APK_PATH=$(ls app/build/outputs/apk/release/SVConfig-*-release.apk)
          APK_FILE=$(basename "$APK_PATH")

          # Clone the fdroid repo
          git clone \
            "https://x-access-token:${FDROID_TOKEN}@github.com/northstar-works/fdroid.git" \
            fdroid-repo

          # Copy the new APK in, removing any older SVConfig APKs first
          rm -f fdroid-repo/repo/SVConfig-*.apk
          cp "$APK_PATH" fdroid-repo/repo/

          cd fdroid-repo

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add repo/"$APK_FILE"
          git status

          # Only commit if there's actually a change
          if git diff --cached --quiet; then
            echo "No APK change detected, skipping commit."
          else
            VERSION=$(echo "$APK_FILE" | sed 's/SVConfig-\(.*\)-release\.apk/\1/')
            git commit -m "chore: update SVConfig Android APK to v${VERSION}"
            git push
          fi
